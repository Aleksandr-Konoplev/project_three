{% load static %}
<!--suppress HtmlUnknownTarget -->
<nav class="navbar navbar-expand-lg bg-body-tertiary" style="padding: 0.5rem 1rem;">
    <div class="container">
        <a class="navbar-brand" href="{% url 'catalog:product_list' %}" style="display: flex; align-items: center;">
            <img alt="Главная"
                 src="{% static 'blog/img/logo/shopaholics_logo_light.png' %}"
                 data-logo-light="{% static 'blog/img/logo/shopaholics_logo_dark.png' %}"
                 data-logo-dark="{% static 'blog/img/logo/shopaholics_logo_light.png' %}"
                 style="height: 40px;">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto" style="align-items: center;">

                <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="#" style="padding: 0.5rem 1rem;">Главная</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'blog:posts_list' %}" style="padding: 0.5rem 1rem;">Блог</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'blog:post_create' %}" style="padding: 0.5rem 1rem;">+ Добавить пост</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'catalog:add_product' %}" style="padding: 0.5rem 1rem;">+ Добавить товар</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'catalog:contacts' %}" style="padding: 0.5rem 1rem;">Контакты</a>
                </li>

                {% if user.is_authenticated %}
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center"
                       href="#"
                       id="userDropdown"
                       role="button"
                       data-bs-toggle="dropdown"
                       aria-expanded="false"
                       style="height: 50px; padding: 0 0.5rem;">

                        <img src="{% if user.avatar %}{{ user.avatar.url }}{% else %}/media/users/avatars/default.png{% endif %}"
                             alt="avatar"
                             class="rounded-circle me-2"
                             style="width: 40px; height: 40px; object-fit: cover; flex-shrink: 0;">

                        <span class="d-none d-lg-inline" style="line-height: 40px;">{{ user.email }}</span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="userDropdown">
                        <li class="dropdown-item-text small text-muted">{{ user.email }}</li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form method="post" action="{% url 'users:logout' %}">
                                {% csrf_token %}
                                <button type="submit" class="dropdown-item text-danger">Выйти</button>
                            </form>
                        </li>
                    </ul>
                </li>
                {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'users:login' %}" style="padding: 0.5rem 1rem;">Войти</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'users:register' %}" style="padding: 0.5rem 1rem;">Регистрация</a>
                </li>
                {% endif %}

            </ul>
        </div>
    </div>
</nav>
